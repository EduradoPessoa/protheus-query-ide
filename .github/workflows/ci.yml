name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  lint-backend:
    name: Lint Backend (TLPP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate TLPP files
        run: |
          find backend/src -name "*.prw" -o -name "*.tlpp" | while read -r file; do
            echo "Validating: $file"
            if ! grep -q "/*/{/*/}" "$file" 2>/dev/null; then
              echo "  OK"
            fi
          done

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --no-watch --browsers=ChromeHeadless

      - name: Run backend tests
        working-directory: backend
        run: |
          if [ -f "tests/run.sh" ]; then
            bash tests/run.sh
          else
            echo "No backend test runner found, skipping."
          fi
